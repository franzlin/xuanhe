<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宣和二年</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1410;--card:#2a2118;--border:#4a3a28;
  --gold:#c9a84c;--red:#b5453a;--green:#5a8a5a;
  --text:#e8dcc8;--dim:#8a7a68;--blue:#5a7a9a;
}
body{font-family:"Songti SC","SimSun","STSong",serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.top-bar h1{font-size:16px;color:var(--gold);letter-spacing:2px}
.top-bar .btn{background:none;border:1px solid var(--border);color:var(--dim);
  padding:4px 10px;font-size:12px;border-radius:4px;cursor:pointer;font-family:inherit}
.top-bar .btn:hover{border-color:var(--gold);color:var(--gold)}

.status-bar{background:var(--card);border-bottom:1px solid var(--border);
  padding:8px 12px;font-size:12px;line-height:1.8}
.status-bar .line{display:flex;flex-wrap:wrap;gap:4px}
.status-bar .tag{background:rgba(201,168,76,0.1);border:1px solid var(--border);
  border-radius:3px;padding:1px 6px;white-space:nowrap}
.status-bar .tag.gold{color:var(--gold);border-color:var(--gold)}
.status-bar .tag.red{color:var(--red);border-color:var(--red)}

.narrative{flex:1;padding:16px 12px;overflow-y:auto;
  font-size:15px;line-height:1.9;min-height:200px}
.narrative .msg{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(74,58,40,0.3)}
.narrative .msg.system{color:var(--dim);font-style:italic;font-size:13px}
.narrative .msg .cost{color:var(--dim);font-size:12px;margin-top:4px}
.narrative .msg .harvest{color:var(--green);font-size:12px}
.narrative .msg.cost{color:var(--dim);font-size:11px;border-top:1px solid rgba(74,58,40,0.2);padding-top:6px;margin-top:-8px}
.narrative .msg.status{color:var(--dim);font-size:12px;margin-top:2px}
.narrative .msg.guide{color:var(--gold);font-size:12px;font-style:italic;margin-top:4px}

.input-area{background:var(--card);border-top:1px solid var(--border);
  padding:10px 12px;display:flex;gap:8px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--bg);border:1px solid var(--border);
  color:var(--text);padding:8px 10px;border-radius:6px;font-size:14px;
  font-family:inherit;resize:none;min-height:38px;max-height:100px;
  outline:none;line-height:1.5}
.input-area textarea:focus{border-color:var(--gold)}
.input-area button{background:var(--gold);color:var(--bg);border:none;
  padding:8px 16px;border-radius:6px;font-size:14px;font-weight:bold;
  cursor:pointer;font-family:inherit;white-space:nowrap}
.input-area button:hover{opacity:0.85}
.input-area button:disabled{opacity:0.4;cursor:not-allowed}

/* 角色创建 */
.create-overlay{position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--bg);z-index:100;display:flex;flex-direction:column;overflow-y:auto}
.create-overlay.hidden{display:none}
.create-panel{padding:20px 16px;max-width:500px;margin:0 auto;width:100%}
.create-panel h2{color:var(--gold);font-size:18px;margin-bottom:16px;text-align:center;letter-spacing:3px}
.create-panel h3{color:var(--gold);font-size:14px;margin:16px 0 8px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px}
.form-group input,.form-group select{width:100%;background:var(--bg);
  border:1px solid var(--border);color:var(--text);padding:8px 10px;
  border-radius:6px;font-size:14px;font-family:inherit;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--gold)}
.trait-grid{display:grid;grid-template-columns:1fr;gap:8px}
.trait-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:10px;cursor:pointer;transition:all .2s}
.trait-card:hover{border-color:var(--gold)}
.trait-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.1)}
.trait-card .name{color:var(--gold);font-size:14px;font-weight:bold}
.trait-card .effect{font-size:12px;color:var(--dim);margin-top:4px}
.identity-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.identity-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:10px;cursor:pointer;text-align:center;transition:all .2s}
.identity-card:hover{border-color:var(--gold)}
.identity-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.1)}
.identity-card .name{color:var(--gold);font-size:14px;font-weight:bold}
.identity-card .desc{font-size:11px;color:var(--dim);margin-top:4px}
.confirm-panel{background:var(--card);border:1px solid var(--gold);
  border-radius:8px;padding:16px;margin:16px 0}
.confirm-panel .attr-line{display:flex;justify-content:space-between;
  font-size:13px;padding:2px 0;border-bottom:1px solid rgba(74,58,40,0.2)}

.quick-btns{display:flex;gap:4px;padding:4px 12px 0;flex-wrap:wrap}
.quick-btns button{background:rgba(201,168,76,0.08);border:1px solid var(--border);
  color:var(--dim);padding:4px 8px;font-size:11px;border-radius:4px;
  cursor:pointer;font-family:inherit;white-space:nowrap}
.quick-btns button:hover{border-color:var(--gold);color:var(--gold)}

.loading{display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(26,20,16,0.8);z-index:200;justify-content:center;align-items:center}
.loading.show{display:flex}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* AI设置面板 */
.ai-overlay{position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(26,20,16,0.9);z-index:150;display:none;overflow-y:auto}
.ai-overlay.show{display:flex;justify-content:center;align-items:flex-start;padding:40px 12px}
.ai-panel{max-width:500px;width:100%;background:var(--card);border:1px solid var(--gold);
  border-radius:10px;padding:20px}
.ai-panel h2{color:var(--gold);font-size:16px;margin-bottom:16px;text-align:center;letter-spacing:2px}
.ai-panel .close-btn{float:right;background:none;border:none;color:var(--dim);
  font-size:20px;cursor:pointer;padding:0 4px}
.ai-panel .close-btn:hover{color:var(--gold)}
.ai-status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.ai-status-dot.on{background:#5a8a5a}
.ai-status-dot.off{background:#b5453a}

/* AI叙事打字效果 */
.narrative .msg.ai-text{border-left:2px solid var(--gold);padding-left:10px}
.narrative .msg .ai-badge{display:inline-block;font-size:10px;color:var(--gold);
  border:1px solid var(--gold);border-radius:3px;padding:0 4px;margin-right:6px;
  vertical-align:middle;opacity:0.6}
.narrative .msg .fallback-badge{display:inline-block;font-size:10px;color:var(--dim);
  border:1px solid var(--border);border-radius:3px;padding:0 4px;margin-right:6px;
  vertical-align:middle;opacity:0.5}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<!-- AI设置面板 -->
<div class="ai-overlay" id="aiOverlay">
  <div class="ai-panel">
    <button class="close-btn" onclick="hideAISettings()">&times;</button>
    <h2>AI 叙事设置</h2>
    <div class="form-group">
      <label>AI 提供商</label>
      <select id="ai_provider" onchange="onProviderChange()">
        <option value="deepseek">DeepSeek（推荐）</option>
        <option value="ollama">Ollama（本地）</option>
        <option value="coze">Coze</option>
      </select>
    </div>
    <!-- DeepSeek 配置 -->
    <div id="cfg_deepseek">
      <div class="form-group">
        <label>API Key</label>
        <input id="ds_api_key" type="password" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>模型</label>
        <select id="ds_model">
          <option value="deepseek-chat">deepseek-chat（推荐）</option>
          <option value="deepseek-reasoner">deepseek-reasoner（推理增强）</option>
        </select>
      </div>
      <p style="font-size:11px;color:var(--dim);margin-bottom:12px">
        获取API Key：<a href="https://platform.deepseek.com/api_keys" target="_blank"
        style="color:var(--gold)">platform.deepseek.com</a>
        <br>约 ¥1/百万token，极低费用
      </p>
    </div>
    <!-- Ollama 配置 -->
    <div id="cfg_ollama" style="display:none">
      <div class="form-group">
        <label>服务地址</label>
        <input id="ol_base_url" value="http://localhost:11434">
      </div>
      <div class="form-group">
        <label>模型</label>
        <input id="ol_model" value="qwen2.5:7b">
      </div>
      <p style="font-size:11px;color:var(--dim);margin-bottom:12px">
        需要先安装 Ollama 并下载模型：<br>
        <code style="color:var(--gold)">ollama pull qwen2.5:7b</code>
      </p>
    </div>
    <!-- Coze 配置 -->
    <div id="cfg_coze" style="display:none">
      <div class="form-group">
        <label>API Key</label>
        <input id="cz_api_key" type="password" placeholder="pat-...">
      </div>
      <div class="form-group">
        <label>Bot ID</label>
        <input id="cz_bot_id" placeholder="你的Coze Bot ID">
      </div>
      <p style="font-size:11px;color:var(--dim);margin-bottom:12px">
        需在 Coze 平台创建 Bot 并获取 API 访问权限
      </p>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button style="flex:1;padding:10px;background:var(--gold);color:var(--bg);border:none;
        border-radius:6px;font-weight:bold;cursor:pointer;font-family:inherit" onclick="saveAISettings()">保存配置</button>
      <button style="flex:1;padding:10px;background:none;border:1px solid var(--border);
        color:var(--text);border-radius:6px;cursor:pointer;font-family:inherit" onclick="testAI()">测试连接</button>
    </div>
    <div id="aiTestResult" style="margin-top:12px;font-size:13px;display:none"></div>
  </div>
</div>

<!-- 角色创建界面 -->
<div class="create-overlay" id="createOverlay">
  <div class="create-panel" id="createPanel">
    <!-- 由JS动态填充 -->
  </div>
</div>

<!-- 游戏主界面 -->
<div class="top-bar">
  <h1>宣和二年</h1>
  <div>
    <button class="btn" onclick="showAISettings()" id="aiBtn">AI</button>
    <button class="btn" onclick="resetGame()">重置</button>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <div class="line"><span class="tag">载入中...</span></div>
</div>

<div class="narrative" id="narrative">
  <div class="msg system">正在连接游戏引擎...</div>
</div>

<div class="quick-btns" id="quickBtns">
  <button onclick="sendAction('查询属性')">属性</button>
  <button onclick="sendAction('查询技能')">技能</button>
  <button onclick="sendAction('查询人脉')">人脉</button>
  <button onclick="sendAction('查询人望')">人望</button>
  <button onclick="sendAction('科举')">科举</button>
  <button onclick="sendAction('研发')">科技</button>
  <button onclick="sendAction('过月')">过月</button>
  <button onclick="showHistory()" style="background:#444">历史记录</button>
  <button onclick="deleteSave()" style="background:#600">新开存档</button>
</div>

<div class="input-area">
  <textarea id="inputBox" placeholder="输入你的行动..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAction()}"></textarea>
  <button id="sendBtn" onclick="sendAction()">行动</button>
</div>

<script>
const API = '';  // 同源，无需前缀
let currentStep = 0;
let charData = {};
let aiConfigured = false;  // AI是否已配置

// ========== 初始化 ==========
window.onload = async () => {
  // 检查AI状态
  checkAIStatus();

  try {
    const res = await fetch(API + '/api/status');
    const data = await res.json();
    if (data.exists) {
      document.getElementById('createOverlay').classList.add('hidden');
      updateStatus(data.player);
      addNarrative('欢迎回来，' + data.player.name + '。宣和二年的故事继续。', 'system');
    } else {
      showCreateStep(0);
    }
  } catch(e) {
    addNarrative('连接游戏引擎失败，请确认服务器已启动。', 'system');
  }
};

// ========== 角色创建 ==========
async function showCreateStep(step) {
  currentStep = step;
  const panel = document.getElementById('createPanel');

  if (step === 0) {
    panel.innerHTML = `
      <h2>宣和二年</h2>
      <p style="text-align:center;color:var(--dim);font-size:13px;margin-bottom:20px">
        北宋末年，天下将倾。你将在这乱世中书写怎样的故事？
      </p>
      <h3>第一步：基本信息</h3>
      <div class="form-group">
        <label>姓名</label>
        <input id="c_name" placeholder="你的名字" value="">
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="c_gender">
          <option value="男">男</option>
          <option value="女">女（注：科举/从军受限）</option>
        </select>
      </div>
      <div class="form-group">
        <label>年龄（≥14）</label>
        <input id="c_age" type="number" value="18" min="14" max="70">
      </div>
      <div class="form-group">
        <label>所属势力</label>
        <select id="c_faction" onchange="loadIdentities()">
          <option value="宋">宋（默认）</option>
          <option value="金">金（女真）</option>
          <option value="辽">辽（契丹）</option>
          <option value="西夏">西夏</option>
          <option value="蒙古">蒙古</option>
        </select>
      </div>
      <div style="text-align:center;margin-top:20px">
        <button class="input-area button" style="width:100%;padding:12px" onclick="nextCreateStep()">下一步</button>
      </div>
    `;
  } else if (step === 1) {
    const faction = document.getElementById('c_faction').value;
    const identities = await loadIdentities(faction);
    const traits = await loadTraits(faction);

    panel.innerHTML = `
      <h3>第二步：身份与特质</h3>
      <h3>选择身份</h3>
      <div class="identity-grid" id="identityGrid">
        ${identities.map((id, i) => `
          <div class="identity-card ${i===0?'selected':''}" onclick="selectIdentity(this, '${id.name}')" data-name="${id.name}">
            <div class="name">${id.name}</div>
            <div class="desc">金${id.attrs.money||0}贯 | 势${id.attrs.power||'微末'}</div>
          </div>
        `).join('')}
      </div>
      <h3 style="margin-top:20px">选择特质（随机5项选1）</h3>
      <div class="trait-grid" id="traitGrid">
        ${traits.map((t, i) => `
          <div class="trait-card ${i===0?'selected':''}" onclick="selectTrait(this, '${t.name}')" data-name="${t.name}">
            <div class="name">${t.name}</div>
            <div class="effect">${t.effect || '特殊效果'}</div>
          </div>
        `).join('')}
      </div>
      <div style="text-align:center;margin-top:8px">
        <button style="background:none;border:1px solid var(--border);color:var(--dim);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:inherit" onclick="loadTraits(document.getElementById('c_faction').value,true)">🔄 重抽特质</button>
      </div>
      <div class="form-group" style="margin-top:12px">
        <label>初始地点（可自由设定，留空则默认）</label>
        <input id="c_location" placeholder="如：汴京·甜水巷、杭州·清河坊">
      </div>
      <div style="text-align:center;margin-top:16px">
        <button style="width:45%;padding:10px;background:none;border:1px solid var(--border);color:var(--dim);border-radius:6px;cursor:pointer;font-family:inherit" onclick="showCreateStep(0)">上一步</button>
        <button style="width:45%;padding:10px;background:var(--gold);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-family:inherit" onclick="nextCreateStep()">确认创建</button>
      </div>
    `;
    charData.identity = identities[0]?.name || '平民';
    charData.trait = traits[0]?.name || '书香门第';
  }
}

async function loadIdentities(faction) {
  faction = faction || document.getElementById('c_faction')?.value || '宋';
  const res = await fetch(API + '/api/identities/' + faction);
  const data = await res.json();
  return data.identities || [];
}

async function loadTraits(faction, rerender) {
  const res = await fetch(API + '/api/traits/' + (faction||'宋'));
  const data = await res.json();
  if (rerender) {
    const grid = document.getElementById('traitGrid');
    if (grid) {
      grid.innerHTML = data.traits.map((t, i) => `
        <div class="trait-card ${i===0?'selected':''}" onclick="selectTrait(this, '${t.name}')" data-name="${t.name}">
          <div class="name">${t.name}</div>
          <div class="effect">${t.effect || '特殊效果'}</div>
        </div>
      `).join('');
      charData.trait = data.traits[0]?.name;
    }
  }
  return data.traits || [];
}

function selectIdentity(el, name) {
  document.querySelectorAll('.identity-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  charData.identity = name;
}

function selectTrait(el, name) {
  document.querySelectorAll('.trait-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  charData.trait = name;
}

async function nextCreateStep() {
  if (currentStep === 0) {
    charData.name = document.getElementById('c_name').value.trim() || '无名氏';
    charData.gender = document.getElementById('c_gender').value;
    charData.age = parseInt(document.getElementById('c_age').value) || 18;
    charData.faction = document.getElementById('c_faction').value;
    showCreateStep(1);
  } else if (currentStep === 1) {
    charData.location = document.getElementById('c_location')?.value.trim() || '';
    await createCharacter();
  }
}

async function createCharacter() {
  showLoading(true);
  try {
    const res = await fetch(API + '/api/create', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(charData)
    });
    const data = await res.json();
    showLoading(false);

    if (data.error) {
      alert(data.error);
      return;
    }

    document.getElementById('createOverlay').classList.add('hidden');
    updateStatus(data);
    const traitStr = data.traits ? JSON.parse(data.traits).join('、') : '';
    addNarrative(
      `宣和二年，正月。${data.faction}地界，${data.location}。\n\n` +
      `${data.name}，${data.gender}，${data.age}岁，${data.identity}出身，${traitStr ? '因' + traitStr + '之故' : ''}踏上了这条不归路。\n\n` +
      `【${data.identity}初始】智：${data.intelligence} | 军：${data.military} | 政：${data.politics} | 魅：${data.charm}\n` +
      `金：${parseInt(data.money)}贯 | 势：${data.power} | 望：${data.prestige}\n` +
      `精：${data.energy}/${data.energy_cap}\n\n` +
      `你将如何度过这宣和二年？`,
      ''
    );
  } catch(e) {
    showLoading(false);
    alert('创建失败：' + e.message);
  }
}

// ========== 游戏交互 ==========
async function sendAction(preset) {
  const inputBox = document.getElementById('inputBox');
  const text = preset || inputBox.value.trim();
  if (!text) return;
  inputBox.value = '';

  addNarrative('你：' + text, 'user');

  showLoading(true);
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch(API + '/api/action', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({input: text})
    });
    const data = await res.json();
    showLoading(false);
    document.getElementById('sendBtn').disabled = false;

    if (data.error) {
      addNarrative('⚠ ' + data.error, 'system');
      return;
    }

    // 叙事
    let narrativeText = data.narrative || '';

    // 代价行
    if (data.energy_cost) {
      narrativeText += `\n（消耗：精${data.energy_cost}`;
      if (data.type === '战斗' && data.combat_result) {
        narrativeText += ` | 金${data.combat_result.loot_money}贯`;
      }
      narrativeText += ` → 收获：${data.harvest_tags || '无'}）`;
    }

    // 自动过月提示
    if (data.need_month_settle) {
      narrativeText += '\n\n⚡ 精力耗尽，即将进入过月结算...';
    }

    addNarrative(narrativeText, '');

    // 三件套：消耗标注 + 状态行 + 引导语（文档P0.4）
    if (data.cost_line) {
      addNarrative(data.cost_line, 'cost');
    }
    if (data.status_line) {
      addNarrative(data.status_line, 'status');
      updateStatusFromLine(data.status_line);
    }
    if (data.guide_line) {
      addNarrative(data.guide_line, 'guide');
    }

    // 更新状态栏
    if (data.player) {
      updateStatus(data.player);
    }

    // 自动过月
    if (data.need_month_settle) {
      setTimeout(() => doMonthSettle(), 1500);
    }

  } catch(e) {
    showLoading(false);
    document.getElementById('sendBtn').disabled = false;
    addNarrative('⚠ 连接失败：' + e.message, 'system');
  }
}

async function doMonthSettle() {
  showLoading(true);
  try {
    const res = await fetch(API + '/api/month_settle', {method: 'POST'});
    const data = await res.json();
    showLoading(false);

    if (data.error) {
      addNarrative('⚠ ' + data.error, 'system');
      return;
    }

    let text = '━━ 过月结算 ━━\n\n';
    text += data.narrative || '本月无重大变化。';
    text += '\n\n新的一月已至，精力已恢复。';

    addNarrative(text, '');
    if (data.player) updateStatus(data.player);
    if (data.status_line) updateStatusFromLine(data.status_line);
  } catch(e) {
    showLoading(false);
    addNarrative('⚠ 过月结算失败', 'system');
  }
}

async function resetGame() {
  if (!confirm('确定要重置游戏吗？所有进度将丢失！')) return;
  await fetch(API + '/api/reset', {method: 'POST'});
  document.getElementById('createOverlay').classList.remove('hidden');
  document.getElementById('narrative').innerHTML = '';
  showCreateStep(0);
}

// ========== AI 设置 ==========
async function checkAIStatus() {
  try {
    const res = await fetch(API + '/api/ai/status');
    const data = await res.json();
    aiConfigured = data.configured;
    const btn = document.getElementById('aiBtn');
    if (aiConfigured) {
      btn.innerHTML = '<span class="ai-status-dot on"></span>AI';
      btn.title = data.provider + ' 已连接';
    } else {
      btn.innerHTML = '<span class="ai-status-dot off"></span>AI';
      btn.title = 'AI未配置，点击设置';
    }
  } catch(e) {
    // 静默失败
  }
}

function showAISettings() {
  document.getElementById('aiOverlay').classList.add('show');
  loadAIConfigToForm();
}

function hideAISettings() {
  document.getElementById('aiOverlay').classList.remove('show');
}

async function loadAIConfigToForm() {
  try {
    const res = await fetch(API + '/api/ai/status');
    const data = await res.json();

    document.getElementById('ai_provider').value = data.provider || 'deepseek';
    onProviderChange();

    if (data.providers.deepseek) {
      document.getElementById('ds_model').value = data.providers.deepseek.model || 'deepseek-chat';
    }
    if (data.providers.ollama) {
      document.getElementById('ol_base_url').value = data.providers.ollama.base_url || 'http://localhost:11434';
      document.getElementById('ol_model').value = data.providers.ollama.model || 'qwen2.5:7b';
    }
    if (data.providers.coze) {
      document.getElementById('cz_bot_id').value = data.providers.coze.model || '';
    }
  } catch(e) {
    // 静默
  }
}

function onProviderChange() {
  const provider = document.getElementById('ai_provider').value;
  document.getElementById('cfg_deepseek').style.display = provider === 'deepseek' ? '' : 'none';
  document.getElementById('cfg_ollama').style.display = provider === 'ollama' ? '' : 'none';
  document.getElementById('cfg_coze').style.display = provider === 'coze' ? '' : 'none';
}

async function saveAISettings() {
  const provider = document.getElementById('ai_provider').value;
  const payload = { provider };

  if (provider === 'deepseek') {
    const key = document.getElementById('ds_api_key').value.trim();
    const model = document.getElementById('ds_model').value;
    if (key) payload.deepseek_api_key = key;
    payload.deepseek_model = model;
  } else if (provider === 'ollama') {
    payload.ollama_base_url = document.getElementById('ol_base_url').value.trim();
    payload.ollama_model = document.getElementById('ol_model').value.trim();
  } else if (provider === 'coze') {
    const key = document.getElementById('cz_api_key').value.trim();
    const botId = document.getElementById('cz_bot_id').value.trim();
    if (key) payload.coze_api_key = key;
    if (botId) payload.coze_bot_id = botId;
  }

  try {
    const res = await fetch(API + '/api/ai/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) {
      checkAIStatus();
      const resultDiv = document.getElementById('aiTestResult');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<span style="color:var(--green)">✓ 配置已保存</span>';
      setTimeout(() => { resultDiv.style.display = 'none'; }, 2000);
    }
  } catch(e) {
    alert('保存失败：' + e.message);
  }
}

async function testAI() {
  const resultDiv = document.getElementById('aiTestResult');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '<span style="color:var(--dim)">正在测试连接...</span>';

  try {
    // 先保存当前配置
    await saveAISettingsSilent();

    const res = await fetch(API + '/api/ai/test', {method: 'POST'});
    const data = await res.json();

    if (data.success) {
      resultDiv.innerHTML = '<span style="color:var(--green)">✓ 连接成功</span><br><br>' +
        '<span style="color:var(--text);font-size:14px;line-height:1.8">' +
        data.narrative.replace(/\n/g, '<br>') + '</span>';
    } else {
      resultDiv.innerHTML = '<span style="color:var(--red)">✗ 连接失败</span><br>' +
        '<span style="color:var(--dim);font-size:11px">' + (data.error || '未知错误') + '</span>';
    }
  } catch(e) {
    resultDiv.innerHTML = '<span style="color:var(--red)">✗ 请求失败</span><br>' +
      '<span style="color:var(--dim);font-size:11px">' + e.message + '</span>';
  }
}

async function saveAISettingsSilent() {
  const provider = document.getElementById('ai_provider').value;
  const payload = { provider };

  if (provider === 'deepseek') {
    const key = document.getElementById('ds_api_key').value.trim();
    if (key) payload.deepseek_api_key = key;
    payload.deepseek_model = document.getElementById('ds_model').value;
  } else if (provider === 'ollama') {
    payload.ollama_base_url = document.getElementById('ol_base_url').value.trim();
    payload.ollama_model = document.getElementById('ol_model').value.trim();
  } else if (provider === 'coze') {
    const key = document.getElementById('cz_api_key').value.trim();
    const botId = document.getElementById('cz_bot_id').value.trim();
    if (key) payload.coze_api_key = key;
    if (botId) payload.coze_bot_id = botId;
  }

  await fetch(API + '/api/ai/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
}

// ========== UI工具 ==========
function addNarrative(text, type) {
  const div = document.createElement('div');
  div.className = 'msg' + (type ? ' ' + type : '');
  div.style.whiteSpace = 'pre-wrap';
  div.textContent = text;
  const narrative = document.getElementById('narrative');
  narrative.appendChild(div);
  narrative.scrollTop = narrative.scrollHeight;
  // 记录到历史（跳过多余的系统消息）
  if (!type || type !== 'system') {
    chatHistory.push({time: new Date().toLocaleTimeString(), text: text.substring(0, 300)});
    if (chatHistory.length > 80) chatHistory.shift();
  }
}

function updateStatus(player) {
  const bar = document.getElementById('statusBar');
  const energyPct = player.energy_cap > 0 ? Math.round(player.energy / player.energy_cap * 100) : 0;
  const energyColor = energyPct > 60 ? 'gold' : energyPct > 30 ? '' : 'red';

  bar.innerHTML = `
    <div class="line">
      <span class="tag gold">时：${player.current_time || '宣和二年正月'}</span>
      <span class="tag">金：${parseInt(player.money||0)}贯</span>
      <span class="tag ${energyColor}">精：${player.energy}/${player.energy_cap}</span>
      <span class="tag">身：${player.health || '康健'}</span>
    </div>
    <div class="line" style="margin-top:2px">
      <span class="tag">地：${player.location || '东京开封府'}</span>
      <span class="tag">职：${player.official_rank || '白身'}</span>
      <span class="tag">势：${player.power || '微末'}</span>
      <span class="tag">望：${player.prestige || '默默无闻'}</span>
    </div>
  `;
}

function updateStatusFromLine(line) {
  // 从状态行文本解析并更新
  const bar = document.getElementById('statusBar');
  if (!line) return;
  const lines = line.split('\n');
  bar.innerHTML = lines.map(l => `<div class="line">${l}</div>`).join('');
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('show', show);
}

// 自动调整输入框高度
const inputBox = document.getElementById('inputBox');
inputBox.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// === 历史记录 ===
const chatHistory = [];

function showHistory() {
  if (chatHistory.length === 0) {
    alert('暂无对话记录');
    return;
  }
  let h = '<div style="max-height:60vh;overflow-y:auto;text-align:left;font-size:13px;line-height:1.6">';
  h += '<h3>对话记录（最近80条）</h3>';
  chatHistory.forEach(c => {
    h += `<p><span style="color:#888">${c.time}</span> ${c.text.substring(0,200)}</p><hr style="opacity:0.2">`;
  });
  h += '</div>';
  addNarrative(h, 'system');
  // 滚动到底部
  const nar = document.getElementById('narrative');
  nar.scrollTop = nar.scrollHeight;
}

// === 新开存档 ===
async function deleteSave() {
  if (!confirm('确定删除当前存档并重新开始吗？\n此操作不可撤销！')) return;
  try {
    const r = await fetch(API + '/api/player/delete', { method: 'POST' });
    const d = await r.json();
    if (d.success) {
      alert(d.message);
      location.reload();
    } else {
      alert('删除失败：' + d.error);
    }
  } catch(e) {
    alert('操作失败：' + e.message);
  }
}
</script>
